[tool.uv.workspace]
members = ["packages/*", "jobs/*"]

[dependency-groups]
dev = [
    "ruff>=0.14.13",
    "pytest>=8.3.0",
    "mypy>=1.13.0",
]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["packages", "jobs"]
python_files = ["test_*.py"]

[tool.mypy]
python_version = "3.11"
explicit_package_bases = true
ignore_missing_imports = true
mypy_path = "packages/common/src:jobs/account/src"
