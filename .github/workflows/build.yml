name: Build

on:
  push:
    branches: [main]
    paths:
      - "jobs/**"
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      module:
        description: Job module to build
        default: account
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        module: [account] # add new job modules here
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ vars.AR_LOCATION }} --quiet

      - name: Build and push (built once, promoted by digest)
        id: image
        run: |
          repo="${{ vars.AR_REPOSITORY }}/${{ matrix.module }}"
          docker build -f "jobs/${{ matrix.module }}/Dockerfile" -t "${repo}:${GITHUB_SHA}" .
          docker push "${repo}:${GITHUB_SHA}"
          digest=$(gcloud artifacts docker images describe "${repo}:${GITHUB_SHA}" \
            --format='value(image_summary.digest)')
          echo "ref=${repo}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Deploy to dev
        run: |
          gcloud run jobs update "datalake-${{ matrix.module }}-dev" \
            --image "${{ steps.image.outputs.ref }}" \
            --region "${{ vars.REGION }}" \
            --project "${{ vars.GCP_PROJECT }}"

      - name: Summary
        run: echo "Built and deployed to dev — \`${{ steps.image.outputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
