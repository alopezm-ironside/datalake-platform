pre-commit:
  parallel: false
  commands:
    ruff-check:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitizen:
      run: uv run cz check --commit-msg-file {1}

pre-push:
  parallel: true
  commands:
    mypy:
      run: uv run mypy
    pytest:
      run: uv run pytest
