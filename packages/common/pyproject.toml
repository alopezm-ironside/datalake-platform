[project]
name = "etl-common"
version = "0.1.0"
description = "Shared infrastructure and ETL contracts for the modular ETL engine"
requires-python = ">=3.11"
dependencies = [
    "pydantic-settings>=2.12.0",
    "sqlalchemy>=2.0.45",
    "sqlalchemy-bigquery>=1.16.0",
    "google-cloud-bigquery>=3.40.0",
    "structlog>=24.1.0",
]

[project.optional-dependencies]
sheets = [
    "google-api-python-client>=2.187.0",
    "google-auth>=2.41.1",
    "google-auth-oauthlib>=1.2.3",
]
postgres = ["psycopg2-binary>=2.9.11"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etl_common"]
